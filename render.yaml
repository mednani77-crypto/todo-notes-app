services:
  - type: web
    name: todo-notes-app
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
